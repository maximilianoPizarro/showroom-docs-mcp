apiVersion: apps/v1
kind: Deployment
metadata:
  name: showroom-docs-mcp
  namespace: openshift-lightspeed
  labels:
    app: showroom-docs-mcp
    app.kubernetes.io/name: showroom-docs-mcp
    app.kubernetes.io/part-of: openshift-lightspeed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: showroom-docs-mcp
  template:
    metadata:
      labels:
        app: showroom-docs-mcp
    spec:
      containers:
        - name: showroom-docs-mcp
          image: quay.io/maximilianopizarro/showroom-docs-mcp:1.3.0
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: showroom-docs-mcp
  namespace: openshift-lightspeed
  labels:
    app: showroom-docs-mcp
spec:
  selector:
    app: showroom-docs-mcp
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  type: ClusterIP
