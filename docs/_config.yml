title: Showroom Docs MCP Server
description: >-
  Quarkus MCP Server that indexes Red Hat product documentation and the
  "IA Development From Zero To Hero" workshop for OpenShift Lightspeed.
baseurl: "/showroom-docs-mcp"
url: "https://maximilianopizarro.github.io"

remote_theme: pages-themes/midnight@v0.2.0
plugins:
  - jekyll-remote-theme

logo: assets/images/logo.svg
favicon: assets/images/favicon.svg
show_downloads: false

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

include:
  - "*.tgz"
  - index.yaml
  - artifacthub-repo.yml

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "index.yaml"
    values:
      layout: null
  - scope:
      path: "*.tgz"
    values:
      layout: null

navigation:
  - title: Home
    url: /
  - title: Architecture
    url: /architecture/
  - title: Quick Start
    url: /quickstart/
  - title: Configuration
    url: /configuration/
  - title: API Tools
    url: /api-tools/
  - title: Content Index
    url: /content-index/
  - title: Screenshots
    url: /screenshots/
  - title: "Espanol"
    url: /es/
