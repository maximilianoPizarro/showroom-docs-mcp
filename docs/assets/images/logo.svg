<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3BF5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E03C8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#6C3BF5;stop-opacity:0.08" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6C3BF5" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="#0F0E17" stroke="url(#aiGrad)" stroke-width="3"/>

  <!-- Magnifying glass lens -->
  <circle cx="220" cy="210" r="120" fill="url(#lensGrad)" stroke="url(#aiGrad)" stroke-width="8" filter="url(#softShadow)"/>

  <!-- Neural network nodes inside lens -->
  <g filter="url(#glow)" opacity="0.9">
    <!-- Central node -->
    <circle cx="220" cy="195" r="12" fill="#E03C8A"/>
    <!-- Top node -->
    <circle cx="220" cy="135" r="8" fill="#A78BFA"/>
    <!-- Bottom-left node -->
    <circle cx="165" cy="235" r="8" fill="#A78BFA"/>
    <!-- Bottom-right node -->
    <circle cx="275" cy="235" r="8" fill="#A78BFA"/>
    <!-- Top-left node -->
    <circle cx="165" cy="160" r="6" fill="#F97316"/>
    <!-- Top-right node -->
    <circle cx="275" cy="160" r="6" fill="#F97316"/>
    <!-- Extra nodes -->
    <circle cx="195" cy="265" r="5" fill="#F97316"/>
    <circle cx="245" cy="265" r="5" fill="#F97316"/>

    <!-- Connections -->
    <line x1="220" y1="195" x2="220" y2="135" stroke="#A78BFA" stroke-width="2" opacity="0.7"/>
    <line x1="220" y1="195" x2="165" y2="235" stroke="#A78BFA" stroke-width="2" opacity="0.7"/>
    <line x1="220" y1="195" x2="275" y2="235" stroke="#A78BFA" stroke-width="2" opacity="0.7"/>
    <line x1="220" y1="195" x2="165" y2="160" stroke="#F97316" stroke-width="1.5" opacity="0.5"/>
    <line x1="220" y1="195" x2="275" y2="160" stroke="#F97316" stroke-width="1.5" opacity="0.5"/>
    <line x1="220" y1="135" x2="165" y2="160" stroke="#A78BFA" stroke-width="1.5" opacity="0.5"/>
    <line x1="220" y1="135" x2="275" y2="160" stroke="#A78BFA" stroke-width="1.5" opacity="0.5"/>
    <line x1="165" y1="235" x2="275" y2="235" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>
    <line x1="165" y1="235" x2="195" y2="265" stroke="#F97316" stroke-width="1" opacity="0.4"/>
    <line x1="275" y1="235" x2="245" y2="265" stroke="#F97316" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Magnifying glass handle -->
  <line x1="310" y1="300" x2="410" y2="400" stroke="url(#aiGrad)" stroke-width="18" stroke-linecap="round" filter="url(#softShadow)"/>
  <line x1="310" y1="300" x2="410" y2="400" stroke="#0F0E17" stroke-width="8" stroke-linecap="round"/>

  <!-- Sparkle accents -->
  <g fill="#F97316" opacity="0.8">
    <polygon points="370,120 374,130 384,134 374,138 370,148 366,138 356,134 366,130" />
    <polygon points="130,100 133,107 140,110 133,113 130,120 127,113 120,110 127,107" transform="scale(0.8) translate(30,30)"/>
  </g>

  <!-- "AI" text accent -->
  <text x="395" y="155" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="36" fill="url(#aiGrad)" filter="url(#glow)">AI</text>
</svg>
