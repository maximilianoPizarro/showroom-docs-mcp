  Quarkus MCP Server that indexes Red Hat documentation and the
  "IA Development From Zero To Hero" workshop for OpenShift Lightspeed RAG.
  Provides 46 indexed documents covering 27 workshop modules, 9 Red Hat product
  docs (auto-sanitized from PDF), and 10 developer products with quick-start examples.
