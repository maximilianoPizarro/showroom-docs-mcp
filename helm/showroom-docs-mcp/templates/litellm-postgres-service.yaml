{{- if and .Values.litellm.enabled .Values.litellm.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "showroom-docs-mcp.fullname" . }}-litellm-db
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "showroom-docs-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: litellm-db
spec:
  type: ClusterIP
  selector:
    app: {{ include "showroom-docs-mcp.fullname" . }}-litellm-db
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgresql
{{- end }}
