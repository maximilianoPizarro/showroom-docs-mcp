{{- if .Values.inspector.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "showroom-docs-mcp.fullname" . }}-inspector
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "showroom-docs-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: inspector
spec:
  type: {{ .Values.inspector.service.type }}
  selector:
    app: {{ include "showroom-docs-mcp.fullname" . }}-inspector
  ports:
    - port: {{ .Values.inspector.service.port }}
      targetPort: {{ .Values.inspector.service.port }}
      protocol: TCP
      name: http
{{- end }}
