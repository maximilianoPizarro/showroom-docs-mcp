{{- if and .Values.inspector.enabled .Values.inspector.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "showroom-docs-mcp.fullname" . }}-inspector
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "showroom-docs-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: inspector
spec:
  to:
    kind: Service
    name: {{ include "showroom-docs-mcp.fullname" . }}-inspector
    weight: 100
  port:
    targetPort: http
  tls:
    termination: {{ .Values.inspector.route.tls.termination }}
  wildcardPolicy: None
{{- end }}
