{{- if .Values.litellm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "showroom-docs-mcp.fullname" . }}-litellm
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "showroom-docs-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: litellm
    app.openshift.io/runtime: python
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "showroom-docs-mcp.fullname" . }}-litellm
  template:
    metadata:
      labels:
        app: {{ include "showroom-docs-mcp.fullname" . }}-litellm
        app.kubernetes.io/component: litellm
        app.openshift.io/runtime: python
    spec:
      containers:
        - name: litellm
          image: "{{ .Values.litellm.image.repository }}:{{ .Values.litellm.image.tag }}"
          imagePullPolicy: {{ .Values.litellm.image.pullPolicy | default "IfNotPresent" }}
          args:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - {{ .Values.litellm.service.port | quote }}
          ports:
            - containerPort: {{ .Values.litellm.service.port }}
              protocol: TCP
              name: http
          env:
            - name: LITELLM_MASTER_KEY
              value: {{ .Values.litellm.masterKey | quote }}
            - name: GRANITE_API_KEY
              value: {{ .Values.litellm.granite.apiKey | quote }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          resources:
            {{- toYaml .Values.litellm.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "showroom-docs-mcp.fullname" . }}-litellm
{{- end }}
