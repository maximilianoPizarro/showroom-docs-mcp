{{- if and .Values.litellm.enabled .Values.litellm.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "showroom-docs-mcp.fullname" . }}-litellm
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "showroom-docs-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: litellm
  annotations:
    haproxy.router.openshift.io/timeout: "300s"
spec:
  to:
    kind: Service
    name: {{ include "showroom-docs-mcp.fullname" . }}-litellm
    weight: 100
  port:
    targetPort: http
  tls:
    termination: {{ .Values.litellm.route.tls.termination }}
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
{{- end }}
