replicaCount: 1

image:
  repository: quay.io/maximilianopizarro/showroom-docs-mcp
  tag: latest
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

namespace: openshift-lightspeed

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

readinessProbe:
  httpGet:
    path: /q/health/ready
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /q/health/live
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 30

nodeSelector: {}
tolerations: []
affinity: {}

inspector:
  enabled: false
  image:
    repository: mcpuse/inspector
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  route:
    enabled: true
    tls:
      termination: edge
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

olsConfig:
  enabled: false
  mcpServerName: showroom-docs-mcp
  mcpServerTimeout: 10
