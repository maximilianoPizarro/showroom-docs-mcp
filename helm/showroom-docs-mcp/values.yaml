replicaCount: 1

image:
  repository: quay.io/maximilianopizarro/showroom-docs-mcp
  tag: latest
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

namespace: openshift-lightspeed

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

readinessProbe:
  httpGet:
    path: /q/health/ready
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /q/health/live
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 30

nodeSelector: {}
tolerations: []
affinity: {}

olsConfig:
  enabled: false
  mcpServerName: showroom-mcp
  mcpServerTimeout: 10
