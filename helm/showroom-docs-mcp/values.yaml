replicaCount: 1

image:
  repository: quay.io/maximilianopizarro/showroom-docs-mcp
  tag: latest
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

namespace: openshift-lightspeed

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

readinessProbe:
  httpGet:
    path: /q/health/ready
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /q/health/live
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 30

nodeSelector: {}
tolerations: []
affinity: {}

inspector:
  enabled: true
  image:
    repository: mcpuse/inspector
    tag: latest
    pullPolicy: IfNotPresent
  mcpServerUrl: ""
  service:
    type: ClusterIP
    port: 8080
  route:
    enabled: true
    timeout: "300s"
    tls:
      termination: edge
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

litellm:
  enabled: false
  image:
    repository: litellm/litellm-non_root
    tag: v1.82.3-stable
    pullPolicy: IfNotPresent
  service:
    port: 4000
  route:
    enabled: true
    tls:
      termination: edge
  masterKey: "sk-showroom-mcp-1234"
  granite:
    modelId: isvc-granite-31-8b-fp8
    apiBase: "https://isvc-granite-31-8b-fp8-predictor.sandbox-shared-models.svc.cluster.local:8443/v1"
    apiKey: ""
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

olsConfig:
  enabled: false
  mcpServerName: showroom-docs-mcp
  mcpServerTimeout: 10
  llm:
    provider: rhoai_vllm
    model: granite-3-8b-instruct
    url: ""
    credentialsSecret: ols-llm-credentials
